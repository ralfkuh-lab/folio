<!DOCTYPE html>
<html lang="de" class="">
<head>
<meta charset="UTF-8">
<base href="./">
<title>Folio</title>
<style>
  :root {
    color-scheme: light dark;
    --fg: #1f2328;
    --fg-muted: #59636e;
    --bg: #ffffff;
    --border: #d1d9e0;
    --accent: #0969da;
    --code-bg: #f6f8fa;
    --quote-border: #d1d9e0;
    /* Rail-Tokens — eigene Hue-Skala fuer die rechte TOC-Region. */
    --rail-bg: #e8e8e8;
    --rail-fg: #1f2328;
    --rail-fg-muted: #6a7380;
    --rail-header-bg: #dcdcdc;
    --rail-accent: #0969da;
    --rail-hover-bg: #d6e3f3;
    --rail-selected-bg: #d6e3f3;
    --rail-selected-fg: #1c3a5e;
    --toc-w: 260px;
    --vault-w: 240px;
  }
  html.theme-dark {
    --fg: #e6edf3;
    --fg-muted: #9198a1;
    --bg: #1e1e1e;
    --border: #30363d;
    --accent: #4493f8;
    --code-bg: #262626;
    --quote-border: #30363d;
    --rail-bg: #121212;
    --rail-fg: #d4d4d4;
    --rail-fg-muted: #8a8a8a;
    --rail-header-bg: #1a1a1a;
    --rail-accent: #4493f8;
    --rail-hover-bg: #22304a;
    --rail-selected-bg: #22304a;
    --rail-selected-fg: #e6edf3;
  }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
    font-size: 16px;
    line-height: 1.55;
  }
  /* Shell-Layout: 5 Spalten = Vault | Splitter-Left | View/Editor | Splitter-Right | TOC.
     Body-Klassen vault-hidden / toc-hidden kollabieren die jeweilige Rail
     samt Splitter. edit-mode tauscht View-Region und Editor-Region in der
     mittleren Spalte (display:none/flex), Splitter und Rails bleiben
     unveraendert nutzbar. */
  body {
    display: grid;
    grid-template-columns: var(--vault-w, 240px) 4px 1fr 4px var(--toc-w, 260px);
    grid-template-rows: auto 1fr auto;
    height: 100vh;
    overflow: hidden;
  }
  body.vault-hidden {
    grid-template-columns: 0 0 1fr 4px var(--toc-w, 260px);
  }
  body.toc-hidden {
    grid-template-columns: var(--vault-w, 240px) 4px 1fr 0 0;
  }
  body.vault-hidden.toc-hidden {
    grid-template-columns: 0 0 1fr 0 0;
  }
  .toolbar {
    grid-row: 1;
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 1px;
    padding: 4px 6px;
    background: var(--rail-header-bg);
    border-bottom: 1px solid var(--border);
    min-height: 36px;
  }
  .toolbar .group { display: inline-flex; gap: 1px; align-items: center; }
  .toolbar .spacer { flex: 1 1 auto; }
  .toolbar .sep {
    width: 1px;
    height: 18px;
    background: var(--border);
    margin: 0 6px;
  }
  .toolbar button {
    background: transparent;
    border: 1px solid transparent;
    color: var(--fg);
    padding: 4px 7px;
    border-radius: 3px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font: inherit;
    line-height: 1;
    min-width: 28px;
    min-height: 26px;
  }
  .toolbar button:hover:not(:disabled) { background: var(--rail-hover-bg); }
  .toolbar button.active { background: var(--rail-selected-bg); color: var(--rail-selected-fg); }
  .toolbar button:disabled { opacity: 0.4; cursor: default; }
  .toolbar button svg { display: block; }
  /* Segoe-Fluent-Icons-Glyphen (monochrom, Win11). */
  .toolbar button.ti-fluent {
    font-family: "Segoe Fluent Icons", "Segoe MDL2 Assets", sans-serif;
    font-size: 15px;
    line-height: 1;
  }
  /* Color-Emoji-Glyphen — Unicode-Standard-Codepoints, gerendert über
     systemeigene Color-Emoji-Fonts (Segoe UI Emoji / Apple / Noto). */
  .toolbar button.ti-emoji,
  .vault-region .vault-cmd.ti-emoji,
  .statusbar button.ti-emoji {
    font-family: "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji",
                 "Twemoji Mozilla", system-ui, sans-serif;
    font-size: 15px;
    line-height: 1;
  }
  .vault-region .vault-cmd.ti-emoji,
  .statusbar button.ti-emoji { font-size: 14px; }
  body:not(.edit-mode) .toolbar .edit-only { display: none; }
  body:not(.edit-mode) #cheatsheet-overlay { display: none !important; }
  .statusbar {
    grid-row: 3;
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 3px 8px;
    background: var(--rail-header-bg);
    border-top: 1px solid var(--border);
    color: var(--fg-muted);
    font-size: 11.5px;
    min-height: 22px;
  }
  .statusbar .status-path {
    flex: 1 1 auto;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .statusbar .status-path.dirty::after { content: ' •'; color: var(--accent); font-weight: bold; }
  .statusbar .status-cell { flex: 0 0 auto; }
  .statusbar button {
    background: transparent;
    border: 1px solid transparent;
    color: var(--fg);
    padding: 1px 5px;
    border-radius: 3px;
    cursor: pointer;
    line-height: 1;
    display: inline-flex;
    align-items: center;
  }
  .statusbar button:hover { background: var(--rail-hover-bg); }
  /* DnD-Overlay */
  #dnd-overlay {
    position: fixed;
    inset: 0;
    background: rgba(9, 105, 218, 0.12);
    border: 3px dashed var(--accent);
    z-index: 9999;
    display: none;
    align-items: center;
    justify-content: center;
    color: var(--accent);
    font-weight: 600;
    font-size: 18px;
    pointer-events: none;
  }
  body.dnd-active #dnd-overlay { display: flex; }
  #unsaved-dialog[hidden] { display: none; }
  #unsaved-dialog {
    position: fixed;
    inset: 0;
    z-index: 10001;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.28);
  }
  .unsaved-dialog__panel {
    width: min(420px, calc(100vw - 32px));
    background: var(--bg);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: 0 10px 32px rgba(0, 0, 0, 0.28);
    padding: 18px;
  }
  .unsaved-dialog__title {
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 8px;
  }
  .unsaved-dialog__text {
    color: var(--fg-muted);
    font-size: 13px;
    line-height: 1.45;
    margin-bottom: 16px;
  }
  .unsaved-dialog__actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  .unsaved-dialog__actions button {
    min-width: 86px;
    border: 1px solid var(--border);
    background: var(--rail-bg);
    color: var(--fg);
    border-radius: 4px;
    padding: 5px 10px;
    cursor: pointer;
  }
  .unsaved-dialog__actions button:hover { background: var(--rail-hover-bg); }
  .unsaved-dialog__actions .primary {
    border-color: var(--accent);
    background: var(--accent);
    color: white;
  }
  /* Zoom-Indikator (browser-ähnliche Pille beim Skalieren) */
  #zoom-indicator {
    position: fixed;
    top: 14px;
    right: 14px;
    z-index: 10020;
    padding: 6px 14px;
    background: rgba(36, 36, 36, 0.92);
    color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 16px;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    font-size: 13px;
    font-weight: 500;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    user-select: none;
  }
  #zoom-indicator.visible { opacity: 1; }
  /* Export-Dialog */
  #export-dialog[hidden] { display: none; }
  #export-dialog {
    position: fixed;
    inset: 0;
    z-index: 10001;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.28);
  }
  .export-dialog__panel {
    width: min(820px, calc(100vw - 48px));
    max-height: calc(100vh - 48px);
    display: flex;
    flex-direction: column;
    background: var(--bg);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: 0 10px 32px rgba(0, 0, 0, 0.28);
    padding: 18px;
  }
  .export-dialog__title {
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 12px;
  }
  .export-dialog__formats {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
  }
  .export-dialog__formats button {
    border: 1px solid var(--border);
    background: var(--rail-bg);
    color: var(--fg);
    border-radius: 4px;
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
  }
  .export-dialog__formats button.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .export-dialog__formats button:disabled {
    opacity: 0.5;
    cursor: default;
  }
  .export-dialog__cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    overflow: auto;
    padding-bottom: 4px;
  }
  .export-card {
    border: 2px solid var(--border);
    border-radius: 6px;
    padding: 10px;
    background: var(--rail-bg);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: border-color 0.15s;
  }
  .export-card:hover { border-color: var(--rail-hover-bg); }
  .export-card.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent) inset;
  }
  .export-card__name {
    font-weight: 600;
    font-size: 13px;
  }
  .export-card__desc {
    font-size: 11.5px;
    color: var(--fg-muted);
    line-height: 1.35;
    min-height: 2.6em;
  }
  .export-card__preview {
    width: 100%;
    height: 220px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: #fff;
    pointer-events: none;
  }
  .export-card__preview iframe {
    width: 100%;
    height: 100%;
    border: 0;
    transform: scale(0.45);
    transform-origin: top left;
    width: 222%;
    height: 222%;
  }
  .export-dialog__actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 14px;
  }
  .export-dialog__actions button {
    min-width: 96px;
    border: 1px solid var(--border);
    background: var(--rail-bg);
    color: var(--fg);
    border-radius: 4px;
    padding: 5px 10px;
    cursor: pointer;
  }
  .export-dialog__actions button:hover:not(:disabled) { background: var(--rail-hover-bg); }
  .export-dialog__actions .primary {
    border-color: var(--accent);
    background: var(--accent);
    color: white;
  }
  .export-dialog__actions .primary:disabled {
    opacity: 0.5;
    cursor: default;
  }
  /* Vault-Sektionen mit Pinned/Recent */
  .vault-region .vault-section { padding: 4px 0; }
  .vault-region .vault-section + .vault-section { border-top: 1px solid var(--border); margin-top: 4px; }
  .vault-region .vault-section-title {
    padding: 4px 10px 2px;
    color: var(--rail-accent);
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .vault-region .vault-item {
    display: flex;
    align-items: center;
    padding: 3px 10px;
    margin: 1px 4px;
    border-radius: 3px;
    cursor: pointer;
  }
  .vault-region .vault-item:hover { background: var(--rail-hover-bg); }
  .vault-region .vault-item.active {
    background: var(--rail-selected-bg);
    color: var(--rail-selected-fg);
    font-weight: 600;
  }
  .vault-region .vault-item .vault-icon { width: 18px; flex: 0 0 auto; text-align: center; margin-right: 4px; }
  .vault-region .vault-item .vault-name { flex: 1 1 auto; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  /* Kontextmenü */
  #context-menu {
    position: fixed;
    z-index: 10000;
    min-width: 200px;
    background: var(--bg);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 4px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    padding: 4px 0;
    font-size: 12px;
    display: none;
  }
  #context-menu.open { display: block; }
  #context-menu .ctx-item {
    padding: 5px 14px;
    cursor: pointer;
    white-space: nowrap;
  }
  #context-menu .ctx-item:hover { background: var(--rail-hover-bg); }
  #context-menu .ctx-item.disabled { opacity: 0.4; cursor: default; }
  #context-menu .ctx-item.disabled:hover { background: transparent; }
  #context-menu .ctx-sep { height: 1px; background: var(--border); margin: 4px 0; }
  body.edit-mode .view-region { display: none; }
  body:not(.edit-mode) .editor-region { display: none; }
  /* Wrapper um view-region + editor-region: gemeinsamer Bezugsrahmen fuer
     position:absolute der find-bar (oben rechts im mittleren Pane), und
     flex-Container, in dem die jeweils sichtbare Region die volle Hoehe fuellt. */
  .content-region {
    grid-row: 2;
    grid-column: 3;
    position: relative;
    min-width: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .vault-region {
    grid-row: 2;
    grid-column: 1;
    overflow: auto;
    background: var(--rail-bg);
    color: var(--rail-fg);
    font-family: "Segoe UI", "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
    font-size: 12px;
    line-height: 1.45;
    user-select: none;
    -webkit-user-select: none;
  }
  body.vault-hidden .vault-region { display: none; }
  .vault-header {
    display: flex;
    align-items: center;
    padding: 8px 6px 6px 10px;
    background: var(--rail-header-bg);
    border-bottom: 1px solid var(--border);
  }
  .vault-header .title {
    flex: 1 1 auto;
    color: var(--rail-accent);
    font-weight: 600;
    font-size: 12px;
  }
  .vault-header .vault-cmd {
    flex: 0 0 auto;
    background: transparent;
    border: 1px solid transparent;
    color: var(--rail-fg);
    padding: 2px 6px;
    margin-left: 2px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 13px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .vault-header .vault-cmd:hover {
    background: var(--rail-hover-bg);
  }
  .splitter-left {
    grid-row: 2;
    grid-column: 2;
    cursor: col-resize;
    background: transparent;
    border-right: 1px solid var(--border);
    user-select: none;
    -webkit-user-select: none;
  }
  .splitter-left:hover { background: rgba(128, 128, 128, 0.18); }
  body.vault-hidden .splitter-left { display: none; }
  .view-region {
    flex: 1 1 auto;
    display: flex;
    flex-direction: row;
    overflow: hidden;
    min-width: 0;
    min-height: 0;
  }
  .view-content {
    flex: 1 1 auto;
    overflow: auto;
    min-width: 0;
  }
  /* Marker-Lane fuer View-Modus — analog zum Editor (#editor-marker-lane).
     Marker werden vom ViewFinder als position:absolute mit top:X% (relativ
     zur Doc-scrollHeight) eingefuegt; .folio-marker bringt das Styling. */
  #view-marker-lane {
    flex: 0 0 6px;
    position: relative;
    background: rgba(128, 128, 128, 0.08);
    border-left: 1px solid var(--border);
  }
  .splitter-right {
    grid-row: 2;
    grid-column: 4;
    cursor: col-resize;
    background: transparent;
    border-left: 1px solid var(--border);
    user-select: none;
    -webkit-user-select: none;
  }
  .splitter-right:hover { background: rgba(128, 128, 128, 0.18); }
  body.toc-hidden .splitter-right { display: none; }
  .toc-region {
    grid-row: 2;
    grid-column: 5;
    overflow: auto;
    background: var(--rail-bg);
    color: var(--rail-fg);
    font-family: "Segoe UI", "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
    font-size: 12px;
    line-height: 1.45;
    user-select: none;
    -webkit-user-select: none;
  }
  body.toc-hidden .toc-region { display: none; }
  /* Vault-Tree (innerhalb .vault-region) */
  .vault-region ul.tree { list-style: none; margin: 0; padding: 4px 0 24px 0; }
  .vault-region ul { list-style: none; margin: 0; padding: 0; }
  .vault-region .section > .row {
    display: flex;
    align-items: center;
    padding: 4px 10px 4px 4px;
    cursor: pointer;
    font-weight: 600;
    color: var(--rail-accent);
  }
  .vault-region .section > .row:hover { background: var(--rail-hover-bg); }
  .vault-region .node > .row {
    display: flex;
    align-items: center;
    padding: 2px 6px 2px 0;
    margin: 1px 6px 1px 8px;
    border-radius: 3px;
    cursor: pointer;
  }
  .vault-region .node > .row:hover { background: var(--rail-hover-bg); }
  .vault-region .node.active > .row {
    background: var(--rail-selected-bg);
    color: var(--rail-selected-fg);
    font-weight: 600;
    box-shadow: inset 2px 0 0 var(--rail-accent);
  }
  .vault-region .caret {
    display: inline-block;
    width: 14px;
    flex: 0 0 auto;
    color: var(--rail-fg-muted);
    font-size: 12px;
    font-weight: 600;
    line-height: 1;
    text-align: center;
    transform: rotate(-90deg);
    transition: transform 0.12s;
    user-select: none;
  }
  .vault-region .caret.open { transform: rotate(0deg); }
  .vault-region .caret.hidden { visibility: hidden; }
  .vault-region .icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 16px;
    flex: 0 0 auto;
    text-align: center;
    margin-right: 4px;
    font-size: 13px;
    line-height: 1;
  }
  .vault-region .icon img.ftype-icon {
    width: 16px;
    height: 16px;
    display: block;
    object-fit: contain;
    image-rendering: -webkit-optimize-contrast;
  }
  .vault-region .label {
    flex: 1 1 auto;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    position: relative;
    top: 2px;
  }
  /* Papierblatt-Emoji hat im Light-Mode kaum Kontrast — dezente Drop-Shadow. */
  html:not(.theme-dark) .vault-region .node.file > .row > .icon {
    filter: drop-shadow(0 0 0.4px rgba(0,0,0,0.7));
  }
  .vault-region ul.children { padding-left: 14px; }
  .vault-region ul.children.collapsed { display: none; }
  .vault-region li.empty {
    color: var(--rail-fg-muted);
    font-style: italic;
    padding: 2px 10px 4px 36px;
    cursor: default;
  }
  .toc-header {
    padding: 8px 10px 6px;
    background: var(--rail-header-bg);
    border-bottom: 1px solid var(--border);
    color: var(--rail-accent);
    font-weight: 600;
    font-size: 12px;
  }
  .toc-empty {
    padding: 8px 10px;
    color: var(--rail-fg-muted);
    font-size: 11px;
  }
  ul.toc {
    list-style: none;
    margin: 0;
    padding: 6px 0 24px 0;
  }
  li.entry {
    display: flex;
    align-items: baseline;
    margin: 1px 6px;
    padding: 3px 10px;
    border-radius: 3px;
    cursor: pointer;
    font-weight: 600;
  }
  li.entry:hover { background: var(--rail-hover-bg); }
  li.entry.active {
    background: var(--rail-selected-bg);
    color: var(--rail-selected-fg);
  }
  li.entry .num {
    flex: 0 0 auto;
    color: var(--rail-accent);
    margin-right: 6px;
  }
  li.entry.active .num { color: var(--rail-selected-fg); }
  li.entry .text {
    flex: 1 1 auto;
    white-space: normal;
    overflow-wrap: anywhere;
  }
  li.entry.h1 {
    font-size: 15px;
    font-weight: 600;
    margin: 4px 6px 10px 6px;
    padding: 4px 10px 6px 10px;
    line-height: 1.25;
  }
  li.entry[data-level="2"] { padding-left: 10px; }
  li.entry[data-level="3"] { padding-left: 24px; }
  li.entry[data-level="4"] { padding-left: 38px; }
  li.entry[data-level="5"] { padding-left: 52px; }
  li.entry[data-level="6"] { padding-left: 66px; }
  /* Markdown-Body: 900px-Constraint relativ zur View-Region (nicht zum
     gesamten Viewport — sonst springt der Inhalt seitlich, wenn die TOC
     ein-/ausgeblendet wird). */
  main.markdown-body {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 40px 64px;
    box-sizing: border-box;
  }
  h1, h2, h3, h4, h5, h6 {
    margin-top: 24px;
    margin-bottom: 16px;
    font-weight: 600;
    line-height: 1.25;
  }
  h1 { font-size: 2em; border-bottom: 1px solid var(--border); padding-bottom: .3em; }
  h2 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: .3em; }
  h3 { font-size: 1.25em; }
  h4 { font-size: 1em; }
  h5 { font-size: .875em; }
  h6 { font-size: .85em; color: var(--fg-muted); }
  p { margin: 0 0 16px; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  ul:not(.toc), ol { padding-left: 2em; margin: 0 0 16px; }
  li + li { margin-top: .25em; }
  blockquote {
    border-left: .25em solid var(--quote-border);
    color: var(--fg-muted);
    padding: 0 1em;
    margin: 0 0 16px;
  }
  code {
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
    font-size: .875em;
    padding: .2em .4em;
    background: var(--code-bg);
    border-radius: 6px;
  }
  pre {
    background: var(--code-bg);
    padding: 16px;
    overflow: auto;
    border-radius: 6px;
    line-height: 1.45;
  }
  pre code {
    padding: 0;
    background: transparent;
    border-radius: 0;
    font-size: .875em;
  }
  table {
    border-collapse: collapse;
    margin: 0 0 16px;
    display: block;
    width: max-content;
    max-width: 100%;
    overflow: auto;
  }
  th, td {
    border: 1px solid var(--border);
    padding: 6px 13px;
  }
  th { background: var(--code-bg); font-weight: 600; }
  tr:nth-child(2n) td { background: rgba(175, 184, 193, 0.08); }
  hr {
    border: 0;
    border-top: 1px solid var(--border);
    margin: 24px 0;
  }
  img { max-width: 100%; height: auto; }
  kbd {
    font-family: ui-monospace, monospace;
    font-size: .75em;
    padding: 3px 5px;
    border: 1px solid var(--border);
    border-bottom-width: 2px;
    border-radius: 4px;
    background: var(--code-bg);
  }
  /* Task lists */
  input[type="checkbox"] { margin-right: .5em; }
  /* Frontmatter-Box */
  aside.frontmatter {
    margin: 0 0 24px;
    padding: 10px 14px;
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: .875em;
    color: var(--fg-muted);
  }
  aside.frontmatter dl {
    display: grid;
    grid-template-columns: max-content 1fr;
    column-gap: 16px;
    row-gap: 4px;
    margin: 0;
  }
  aside.frontmatter dt {
    font-weight: 600;
    color: var(--fg);
  }
  aside.frontmatter dd {
    margin: 0;
    word-break: break-word;
  }
  /* Anchor scroll offset when the title bar is visible */
  :target { scroll-margin-top: 20px; }
  /* ----- Editor-Region (CodeMirror 6 mount + Marker-Lane) ----- */
  .editor-region {
    flex: 1 1 auto;
    position: relative;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
    min-height: 0;
    background: var(--bg);
  }
  body.edit-mode .editor-region { display: flex; }
  .editor-content {
    flex: 1 1 auto;
    display: flex;
    flex-direction: row;
    min-height: 0;
  }
  #editor-mount {
    flex: 1 1 auto;
    min-width: 0;
    height: 100%;
  }
  /* CodeMirror reset overrides */
  #editor-mount .cm-editor { height: 100%; outline: none; }
  #editor-mount .cm-scroller { overflow: auto; }
  #editor-mount .cm-line { padding: 0 8px; }
  /* Marker-Lane: 6px-Streifen rechts neben dem Scroller */
  #editor-marker-lane {
    flex: 0 0 6px;
    position: relative;
    background: rgba(128, 128, 128, 0.08);
    border-left: 1px solid var(--border);
  }
  .folio-marker {
    position: absolute;
    left: 1px;
    right: 1px;
    height: 3px;
    border-radius: 1px;
    background: #FFD700;
    pointer-events: none;
  }
  .folio-marker.active { background: #FF8C00; }
  /* Inline-Treffer im Editor (CodeMirror nutzt <mark class="folio-find-match">). */
  .folio-find-match {
    background: #FFD700;
    color: #000;
    border-radius: 2px;
  }
  .folio-find-match.active {
    background: #FF8C00;
    color: #000;
    border-radius: 2px;
  }
  /* View-Modus nutzt die CSS Custom Highlight API: keine DOM-Mutation,
     daher kein Reflow durch Mark-Wrapping und O(1)-Clear bei neuer Suche. */
  ::highlight(folio-find) {
    background-color: #FFD700;
    color: #000;
  }
  ::highlight(folio-find-active) {
    background-color: #FF8C00;
    color: #000;
  }
  /* Find-Bar oben rechts im Editor */
  .find-bar {
    position: absolute;
    top: 6px;
    right: 12px;
    z-index: 30;
    display: none;
    background: var(--bg);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.18);
    padding: 6px 8px;
    font-size: 12.5px;
    user-select: none;
    -webkit-user-select: none;
  }
  .find-bar.open { display: block; }
  .find-bar__row {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .find-bar input.find-input {
    width: 220px;
    padding: 4px 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--fg);
    border-radius: 3px;
    font: inherit;
  }
  .find-bar .find-counter {
    min-width: 38px;
    text-align: center;
    color: var(--fg-muted);
    font-variant-numeric: tabular-nums;
  }
  .find-bar button.find-btn {
    background: transparent;
    border: 1px solid transparent;
    color: var(--fg);
    padding: 3px 8px;
    border-radius: 3px;
    cursor: pointer;
    font: inherit;
  }
  .find-bar button.find-btn:hover { background: var(--rail-hover-bg); }
  .find-bar button.find-btn.active { background: var(--rail-selected-bg); color: var(--rail-selected-fg); }
  .find-bar__opts {
    margin-top: 4px;
    display: none;
    gap: 12px;
    font-size: 11.5px;
    color: var(--fg-muted);
  }
  .find-bar__opts.open { display: flex; }
  .find-bar__opts label {
    display: flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
  }
  /* ----- Cheat-Sheet-Overlay: position:fixed loest aus dem CSS-Grid, sodass
     das Overlay frei ueber View- und TOC-Region schwebt. Drag nur am Header,
     Body ist scrollbar bei kleinem Fenster. ----- */
  #cheatsheet-overlay {
    position: fixed;
    z-index: 100;
    background: var(--bg);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: 0 6px 24px rgba(0, 0, 0, 0.22);
    font-size: 13px;
    user-select: none;
    -webkit-user-select: none;
    min-width: 320px;
    max-width: 460px;
  }
  #cheatsheet-overlay[hidden] { display: none; }
  #cheatsheet-overlay .overlay__drag {
    cursor: move;
    padding: 10px 16px;
    font-weight: 700;
    font-size: 14px;
    border-bottom: 1px solid var(--border);
  }
  #cheatsheet-overlay .overlay__body {
    padding: 12px 16px 14px;
    display: grid;
    grid-template-columns: max-content 1fr;
    column-gap: 16px;
    row-gap: 4px;
    max-height: 70vh;
    overflow: auto;
  }
  #cheatsheet-overlay .overlay__body .label { color: var(--fg); }
  #cheatsheet-overlay .overlay__body .code {
    font-family: ui-monospace, Consolas, "Cascadia Mono", "Courier New", monospace;
    font-size: 12.5px;
    color: var(--accent);
    white-space: pre-wrap;
  }
  /* Folio-Scrollbar: 12px Track, transparenter Border laesst den Thumb bei
     8px effektiver Breite landen. */
  ::-webkit-scrollbar { width: 12px; height: 12px; }
  ::-webkit-scrollbar-thumb {
    background: rgba(128,128,128,0.35);
    border-radius: 6px;
    border: 2px solid transparent;
    background-clip: padding-box;
  }
  ::-webkit-scrollbar-thumb:hover { background: rgba(128,128,128,0.6); background-clip: padding-box; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-corner { background: transparent; }
</style>

<script>
(function () {
    var post = function (msg) {
        if (window.__TAURI__ && window.__TAURI__.event) {
            window.__TAURI__.event.emit("shell:event", msg);
        }
    };

    // ----- Link-Klicks (im Content) -----
    var contentEl = document.getElementById('view-region');
    contentEl.addEventListener('click', function (e) {
        var el = e.target;
        while (el && el.tagName !== 'A') el = el.parentElement;
        if (!el) return;
        var href = el.getAttribute('href');
        if (href === null) return;
        e.preventDefault();
        post({ type: 'linkClick', href: href });
    }, true);

    // ----- Sichtbare Überschrift + Scroll-Position -----
    (function () {
        var currentHeading = null;
        var lastScrollY = -1;
        function collectHeadings() {
            return Array.prototype.slice.call(
                contentEl.querySelectorAll('h1[id], h2[id], h3[id], h4[id], h5[id], h6[id]')
            );
        }
        function sendHeading(id) {
            if (id === currentHeading) return;
            currentHeading = id;
            post({ type: 'visibleHeading', id: id || '' });
        }
        function sendScroll(y) {
            if (y === lastScrollY) return;
            lastScrollY = y;
            post({ type: 'scrollPosition', y: y });
        }
        function update() {
            var hs = collectHeadings();
            if (hs.length === 0) { sendHeading(null); }
            else {
                var threshold = 120;
                var active = hs[0];
                var contentTop = contentEl.getBoundingClientRect().top;
                for (var i = 0; i < hs.length; i++) {
                    var top = hs[i].getBoundingClientRect().top - contentTop;
                    if (top <= threshold) active = hs[i];
                    else break;
                }
                sendHeading(active.id);
            }
            sendScroll(Math.round(contentEl.scrollTop));
        }
        var rafQueued = false;
        function schedule() {
            if (rafQueued) return;
            rafQueued = true;
            requestAnimationFrame(function () { rafQueued = false; update(); });
        }
        contentEl.addEventListener('scroll', schedule, { passive: true });
        window.addEventListener('resize', schedule);
        window.addEventListener('load', update);
    })();

    // ----- TOC-Click (im rechten Rail) -----
    var tocEl = document.getElementById('toc-region');
    tocEl.addEventListener('click', function (e) {
        var el = e.target;
        while (el && !(el.classList && el.classList.contains('entry'))) el = el.parentElement;
        if (!el) return;
        var slug = el.getAttribute('data-slug');
        if (slug) post({ type: 'tocClick', slug: slug });
    });

    // ----- TOC-API (vom Host gerufen) -----
    window.setTocActive = function (slug) {
        var prev = tocEl.querySelectorAll('li.entry.active');
        for (var i = 0; i < prev.length; i++) prev[i].classList.remove('active');
        if (!slug) return;
        var target = tocEl.querySelector('li.entry[data-slug="' + slug + '"]');
        if (target) {
            target.classList.add('active');
            target.scrollIntoView({ block: 'nearest' });
        }
    };
    window.setTocList = function (html) {
        var ul = tocEl.querySelector('ul.toc');
        if (ul) ul.innerHTML = html;
    };

    // ----- Anker-Scroll innerhalb der View-Region -----
    // location.hash auf einem persistierten Shell-Dokument scrollt sonst die
    // Shell selbst (die nicht scrollt) — wir uebersetzen explizit auf
    // contentEl.scrollIntoView, damit Anker funktionieren.
    window.scrollViewToAnchor = function (slug) {
        if (!slug) return;
        var target = contentEl.querySelector('#' + CSS.escape(slug));
        if (target) target.scrollIntoView({ block: 'start' });
    };
    window.scrollViewTo = function (y) {
        contentEl.scrollTo(0, y || 0);
    };

    // ----- Rail-Visibility / Width (vom Host gerufen) -----
    window.setRailVisibility = function (side, visible) {
        if (side === 'right') {
            document.body.classList.toggle('toc-hidden', !visible);
        } else if (side === 'left') {
            document.body.classList.toggle('vault-hidden', !visible);
        }
    };

    // ----- Vault-Region (Tree, Klick, ContextMenu) -----

    // ----- Cheat-Sheet-Overlay (Drag, Show/Hide) -----
    (function () {
        var overlay = document.getElementById('cheatsheet-overlay');

        var body = document.getElementById('cheatsheet-body');
        var dragState = null;
        var rightOffset = 16;
        var topOffset = 80;
        var wantsVisible = false;
        var lastRows = null;
        var STORAGE_KEY = 'folio.cheatsheet';

        function loadStored() {
            try {
                var raw = localStorage.getItem(STORAGE_KEY);

                var s = JSON.parse(raw);

        function applyPosition() {

            overlay.style.top = topOffset + 'px';
            overlay.style.left = 'auto';
            overlay.style.bottom = 'auto';

        function verticalBounds() {

            var sb = document.getElementById('statusbar');

            if (rect.top < bounds.top) topOffset = bounds.top;

        }

                var rows = (typeof rowsJson === 'string') ? JSON.parse(rowsJson) : rowsJson;

        }

            wantsVisible = true;
            saveStored();
            renderRows(rowsJson);
            overlay.hidden = false;
            applyPosition();
            requestAnimationFrame(clampInsideViewport);
        };

        window.hideCheatSheet = function () {
            wantsVisible = false;
            saveStored();
            if (overlay.hidden) return;
            overlay.hidden = true;
            post({ type: 'cheatsheetClosed', rightOffset: rightOffset, topOffset: topOffset });
        };

        // Mode-Sync: vom setActiveMode aufgerufen. Aendert wantsVisible nicht.
        window.cheatsheetSyncMode = function (isEdit) {
            if (isEdit) {
                if (wantsVisible) {
                    var rows = lastRows;
                    if (!rows && window.__cheatSheetRows) {
                        rows = window.__cheatSheetRows.map(function (r) {
                            return { label: r[0], code: r[1] };
                        });
                    }
                    if (rows) renderRows(rows);
                    overlay.hidden = false;
                    applyPosition();
                    requestAnimationFrame(clampInsideViewport);
                }
            } else {
                if (!overlay.hidden) {
                    overlay.hidden = true;
                }
            }
        };

        window.cheatsheetWantsVisible = function () { return wantsVisible; };

        // Drag am Header
        dragHeader.addEventListener('pointerdown', function (e) {
            try { dragHeader.setPointerCapture(e.pointerId); } catch (_) {}
            dragState = { x: e.clientX, y: e.clientY, r: rightOffset, t: topOffset };
            e.preventDefault();
        });
        dragHeader.addEventListener('pointermove', function (e) {
            if (!dragState) return;
            var dx = e.clientX - dragState.x;
            var dy = e.clientY - dragState.y;
            var rect = overlay.getBoundingClientRect();
            var winW = window.innerWidth;
            var bounds = verticalBounds();
            var maxR = Math.max(0, winW - rect.width);
            var maxT = Math.max(bounds.top, bounds.bottom - rect.height);

            topOffset = Math.min(maxT, Math.max(bounds.top, dragState.t + dy));

        });
        function endDrag(e) {
            if (!dragState) return;
            try { dragHeader.releasePointerCapture(e.pointerId); } catch (_) {}
            dragState = null;
            saveStored();
        }
        dragHeader.addEventListener('pointerup', endDrag);
        dragHeader.addEventListener('pointercancel', endDrag);


        // Window-Resize: in den Viewport zurueckholen.
        window.addEventListener('resize', function () {
            if (overlay.hidden) return;
            clampInsideViewport();
        });
    })();
})();

        if (saveBtn) saveBtn.disabled = !id;
    }
    function openExportDialog() {
        if (!isMarkdownPath(currentPath)) return;
        setExportFormat('html');
        // Editor-Text in den Store syncen, damit die Vorschau den aktuellen Stand zeigt.
        var sync = (document.body.classList.contains('edit-mode') && currentPath)
            ? syncEditorTextToStore() : Promise.resolve();
        sync.then(function () { return invoke('export_layouts'); }).then(function (layouts) {
            var cards = $('export-cards');
            cards.innerHTML = '';
            (layouts || []).forEach(function (layout) {
                var card = document.createElement('div');
                card.className = 'export-card';
                card.dataset.layoutId = layout.id;
                card.tabIndex = 0;
                card.innerHTML =
                    '<div class="export-card__name"></div>' +
                    '<div class="export-card__desc"></div>' +
                    '<div class="export-card__preview"><iframe sandbox></iframe></div>';
                card.querySelector('.export-card__name').textContent = layout.name;
                card.querySelector('.export-card__desc').textContent = layout.description || '';
                card.addEventListener('click', function () { selectLayoutCard(layout.id); });
                card.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        selectLayoutCard(layout.id);
                    }
                });
                cards.appendChild(card);
                invoke('export_render', { layoutId: layout.id }).then(function (html) {
                    var iframe = card.querySelector('iframe');
                    if (iframe && typeof html === 'string') iframe.srcdoc = html;
                }).catch(function () {});
            });
            selectLayoutCard((layouts && layouts[0] && layouts[0].id) || null);
            $('export-dialog').hidden = false;
            exportKeydownHandler = function (e) {
                if (e.key === 'Escape') {
                    e.preventDefault();
                    closeExportDialog();
                } else if (e.key === 'Enter' && selectedLayoutId) {
                    if (e.target && e.target.id === 'export-cancel') return;
                    e.preventDefault();
                    doExportSave();
                }
            };
            document.addEventListener('keydown', exportKeydownHandler);
        }).catch(function (err) {
            showStatus(typeof err === 'string' ? err : 'Export fehlgeschlagen');
        });
    }
    function closeExportDialog() {
        $('export-dialog').hidden = true;
        if (exportKeydownHandler) {
            document.removeEventListener('keydown', exportKeydownHandler);
            exportKeydownHandler = null;
        }
        var cards = $('export-cards');
        if (cards) cards.innerHTML = '';
    }
    function doExportSave() {
        if (!selectedLayoutId) return;
        var fmt = selectedExportFormat;
        var defaultName = fileBaseName(currentPath) + '.' + fmt;
        var cmd = (fmt === 'pdf') ? 'export_pdf' : 'export_html';
        invoke('pick_export_target', { defaultName: defaultName, format: fmt })
            .then(function (targetPath) {
                if (!targetPath) return;
                showStatus('Export läuft…');
                return invoke(cmd, { layoutId: selectedLayoutId, targetPath: targetPath })
                    .then(function () {
                        closeExportDialog();
                        showStatus('Exportiert: ' + targetPath);
                    });
            }).catch(function (err) {
                showStatus(typeof err === 'string' ? err : 'Export fehlgeschlagen');
            });
    }
    bind('tb-export', openExportDialog);
    bind('export-cancel', closeExportDialog);
    bind('export-save', doExportSave);
    var exportFormats = document.getElementById('export-formats');
    if (exportFormats) {
        exportFormats.addEventListener('click', function (e) {
            var btn = e.target.closest('button[data-format]');
            if (!btn || btn.disabled) return;
            setExportFormat(btn.getAttribute('data-format'));
        });
    }
    bind('tb-rail-left', function () {
        var btn = $('tb-rail-left'); var on = !btn.classList.contains('active');
        btn.classList.toggle('active', on);
        invoke('set_rail_visible', { side: 'left', visible: on }).catch(function(){});
    });
    bind('tb-rail-right', function () {
        var btn = $('tb-rail-right'); var on = !btn.classList.contains('active');
        btn.classList.toggle('active', on);
        invoke('set_rail_visible', { side: 'right', visible: on }).catch(function(){});
    });
    bind('tb-find', function () { invoke('open_find').catch(function(){}); });
    bind('tb-back', function () {
        requestSaveIfDirty().then(function (ok) {
            if (ok) invoke('go_back_and_emit').catch(function () {});
        });
    });
    bind('tb-forward', function () {
        requestSaveIfDirty().then(function (ok) {
            if (ok) invoke('go_forward_and_emit').catch(function () {});
        });
    });

    /* ----- Edit-Toolbar: aktuellen Editor-Text+Selection holen, Command
            ans Backend schicken, Ergebnis via applyEditorReplace zurückspielen ----- */
    function applyCmd(name) {
        if (!window.FolioEditor || typeof window.FolioEditor.getText !== 'function') return;
        var text = window.FolioEditor.getText();
        var sel = window.FolioEditor.getSelection() || { start: 0, length: 0 };
        invoke('apply_editor_command', {
            command: name,
            text: text,
            start: sel.start || 0,
            length: sel.length || 0,
        }).then(function (res) {
            if (!res) return;
            window.FolioEditor.applyReplace({
                fullText: res.new_text,
                selectionStart: res.new_selection_start,
                selectionLength: res.new_selection_length,
            });
        }).catch(function (err) { console.warn('apply_editor_command failed:', err); });
    }
    bind('tb-bold',      function () { applyCmd('bold'); });
    bind('tb-italic',    function () { applyCmd('italic'); });
    bind('tb-heading',   function () { applyCmd('heading'); });
    bind('tb-bullet',    function () { applyCmd('bullet'); });
    bind('tb-numbered',  function () { applyCmd('numbered'); });
    bind('tb-link',      function () { applyCmd('link'); });
    bind('tb-image',     function () { applyCmd('image'); });
    bind('tb-table',     function () { applyCmd('table'); });
    bind('tb-code',      function () { applyCmd('code'); });
    bind('tb-codeblock', function () { applyCmd('codeblock'); });
    bind('tb-strike',    function () { applyCmd('strike'); });
    var cheatSheetRows = window.__cheatSheetRows = [
        ['Überschrift',     '# H1   ## H2   ### H3'],
        ['Fett / Kursiv',   '**fett**   *kursiv*'],
        ['Durchgestrichen', '~~text~~'],
        ['Inline-Code',     '`code`'],
        ['Codeblock',       '```codeblock```'],
        ['Link',            '[Text](https://…)'],
        ['Bild',            '![alt](pfad.png)'],
        ['Aufzählung',      '- Item   * Item'],
        ['Nummeriert',      '1. Item'],
        ['Zitat',           '> Text'],
        ['Trennlinie',      '---'],
        ['Tabelle',         '| col | col |\n|---|---|'],
        ['Aufgabe',         '- [ ] offen   - [x] erledigt'],
    ];
    bind('tb-cheatsheet', function () {
        if (!document.body.classList.contains('edit-mode')) return;
        var ov = $('cheatsheet-overlay');
        if (!ov) return;
        if (ov.hidden) {
            if (typeof window.showCheatSheet === 'function') {
                window.showCheatSheet(JSON.stringify(cheatSheetRows.map(function(r){return{label:r[0],code:r[1]};})));
            } else {
                ov.hidden = false;
            }
        } else {
            if (typeof window.hideCheatSheet === 'function') window.hideCheatSheet();
            else ov.hidden = true;
        }
    });

    /* ----- Statusbar ----- */
    function setStatusPath(path, dirty) {
        var el = $('status-path');
        if (!el) return;
        el.textContent = path || 'Bereit';
        el.classList.toggle('dirty', !!dirty);
    }
    function updateWordCount(text) {
        var el = $('status-wordcount');
        if (!el) return;
        if (!text) { el.hidden = true; el.textContent = ''; return; }
        var chars = text.length;
        var words = (text.match(/\S+/g) || []).length;
        var lines = text.split(/\r\n|\r|\n/).length;
        el.hidden = false;
        el.textContent = words + ' Wörter · ' + chars + ' Zeichen · ' + lines + ' Zeilen';
    }
    bind('status-theme-toggle', function () { invoke('theme_set', { mode: 'toggle' }).catch(function(){}); });

    /* ----- Tastatur-Shortcuts ----- */
    /* ----- WebView-Zoom (Ctrl+Mausrad / Ctrl+0 / Ctrl+± ) ----- */
    (function () {
        var ZOOM_KEY = 'folio.zoom';
        var ZOOM_STEP = 0.1;
        var ZOOM_MIN = 0.5;
        var ZOOM_MAX = 3.0;
        var current = 1.0;
        var indicator = $('zoom-indicator');
        var hideTimer = null;
        var fadeTimer = null;
        function showIndicator(z) {
            if (!indicator) return;
            indicator.textContent = Math.round(z * 100) + ' %';
            indicator.hidden = false;
            // requestAnimationFrame, damit die Transition aus 'hidden' heraus greift
            requestAnimationFrame(function () { indicator.classList.add('visible'); });
            if (hideTimer) clearTimeout(hideTimer);
            if (fadeTimer) clearTimeout(fadeTimer);
            hideTimer = setTimeout(function () {
                indicator.classList.remove('visible');
                fadeTimer = setTimeout(function () { indicator.hidden = true; }, 250);
            }, 1500);
        }
        function loadStoredZoom() {
            var z = parseFloat(localStorage.getItem(ZOOM_KEY));
            return (isFinite(z) && z > 0) ? z : 1.0;
        }
        function applyZoom(z, opts) {
            z = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, Math.round(z * 100) / 100));
            current = z;
            // Native Webview-Zoom — passt Viewport-Einheiten korrekt an,
            // im Gegensatz zu document.documentElement.style.zoom.
            invoke('set_webview_zoom', { zoom: z }).catch(function () { /* ignore */ });
            try { localStorage.setItem(ZOOM_KEY, String(z)); } catch (e) { /* ignore */ }
            if (!opts || opts.indicator !== false) showIndicator(z);
            return z;
        }
        function adjustZoom(delta) { return applyZoom(current + delta); }
        function resetZoom() { return applyZoom(1.0); }
        // Beim Boot persistierten Zoom anwenden — ohne Indikator-Flash
        applyZoom(loadStoredZoom(), { indicator: false });
        // Ctrl+Mausrad → Zoom in/out
        window.addEventListener('wheel', function (e) {
            if (!e.ctrlKey && !e.metaKey) return;
            e.preventDefault();
            adjustZoom(e.deltaY < 0 ? ZOOM_STEP : -ZOOM_STEP);
        }, { passive: false });
        // Ctrl+0 reset, Ctrl++ / Ctrl+- als Bonus
        document.addEventListener('keydown', function (e) {
            if (!e.ctrlKey && !e.metaKey) return;
            if (e.key === '0') { e.preventDefault(); resetZoom(); }
            else if (e.key === '+' || e.key === '=') { e.preventDefault(); adjustZoom(ZOOM_STEP); }
            else if (e.key === '-' || e.key === '_') { e.preventDefault(); adjustZoom(-ZOOM_STEP); }
        });
    })();

    document.addEventListener('keydown', function (e) {
        var ctrl = e.ctrlKey || e.metaKey;
        if (ctrl && e.key === '1') { e.preventDefault(); $('tb-mode-view').click(); }
        else if (ctrl && e.key === '2') { e.preventDefault(); $('tb-mode-edit').click(); }
        else if (ctrl && (e.key === 'f' || e.key === 'F')) { e.preventDefault(); invoke('open_find').catch(function(){}); }
        else if (e.key === 'F3') {
            e.preventDefault();
            var fn = e.shiftKey ? window.findPrev : window.findNext;
            if (typeof fn === 'function') fn();
        }
        else if (e.key === 'F1') {
            e.preventDefault();
            if (document.body.classList.contains('edit-mode')) $('tb-cheatsheet').click();
        }
        else if (e.altKey && e.key === 'ArrowLeft') {
            e.preventDefault();
            requestSaveIfDirty().then(function (ok) {
                if (ok) invoke('go_back_and_emit').catch(function(){});
            });
        }
        else if (e.altKey && e.key === 'ArrowRight') {
            e.preventDefault();
            requestSaveIfDirty().then(function (ok) {
                if (ok) invoke('go_forward_and_emit').catch(function(){});
            });
        }
        else if (ctrl && (e.key === 's' || e.key === 'S')) {
            e.preventDefault();
            saveCurrent();
        }
    });

    /* ----- Theme beim Boot laden + an html anwenden ----- */
    invoke('theme_get').then(function (mode) {
        var html = document.documentElement;
        html.classList.toggle('theme-dark', mode === 'dark');
        html.classList.toggle('theme-light', mode === 'light');
        if (typeof window.setEditorTheme === 'function') window.setEditorTheme(mode);
    }).catch(function(){});

    /* ----- Vault: Workspace laden + rendern + Klicks ----- */
    var vaultTree = $('vault-tree');
    var fileIconCache = {};       // ext → data-URI
    var fileIconPending = {};     // ext → Promise (Anti-Stampede)
    function resolveFileIcon(ext) {
        if (fileIconCache[ext] !== undefined) {
            return Promise.resolve(fileIconCache[ext]);
        }
        if (fileIconPending[ext]) return fileIconPending[ext];
        var p = invoke('file_icon_data_uri', { ext: ext }).then(function (uri) {
            fileIconCache[ext] = uri || '';
            delete fileIconPending[ext];
            return fileIconCache[ext];
        }).catch(function () {
            fileIconCache[ext] = '';
            delete fileIconPending[ext];
            return '';
        });
        fileIconPending[ext] = p;
        return p;
    }
    function applyIconsToNode(rootNode) {
        if (!rootNode) return;
        var imgs;
        if (rootNode.matches && rootNode.matches('img.ftype-icon')) {
            imgs = [rootNode];
        } else if (rootNode.querySelectorAll) {
            imgs = rootNode.querySelectorAll('img.ftype-icon');
        } else {
            return;
        }
        for (var i = 0; i < imgs.length; i++) {
            var img = imgs[i];
            if (img.src) continue;
            var ext = img.getAttribute('data-ext') || '';
            (function (target, e) {
                resolveFileIcon(e).then(function (uri) {
                    if (uri) target.src = uri;
                });
            })(img, ext);
        }
    }
    if (vaultTree && typeof MutationObserver === 'function') {
        var iconObserver = new MutationObserver(function (mutations) {
            for (var m = 0; m < mutations.length; m++) {
                var added = mutations[m].addedNodes;
                for (var n = 0; n < added.length; n++) {
                    if (added[n].nodeType === 1) applyIconsToNode(added[n]);
                }
            }
        });
        iconObserver.observe(vaultTree, { childList: true, subtree: true });
    }
    function renderVault(html) {
        if (!vaultTree) return;
        if (!html || html.length === 0) {
            vaultTree.innerHTML = '<li class="empty">Keine Einträge. Datei öffnen oder per Drag&amp;Drop ablegen.</li>';
            return;
        }
        vaultTree.innerHTML = html;
        applyIconsToNode(vaultTree);
    }
    function refreshVault() {
        invoke('vault_build_tree').then(renderVault).catch(function (err) {
            console.warn('vault_build_tree failed:', err);
        });
    }
    refreshVault();

    invoke('cli_pending_open').then(function (path) {
        if (typeof path === 'string' && path.length > 0) {
            openDocument(path);
        }
    }).catch(function () {});

    window.__TAURI__.event.listen('cli:open', function (event) {
        var data = event && event.payload;
        var path = (data && typeof data === 'object') ? data.path : null;
        if (typeof path === 'string' && path.length > 0) {
            openDocument(path);
        }
    });

    if (vaultTree) {
        vaultTree.addEventListener('click', function (e) {
            var item = e.target.closest('.vault-item');
            if (!item) return;
            var path = item.getAttribute('data-path');
            var isDir = item.getAttribute('data-directory') === 'true';
            if (!path) return;
            if (isDir) {
                invoke('vault_expand_dir', { path: path }).catch(function () {});
            } else {
                openDocument(path);
            }
        });
        vaultTree.addEventListener('contextmenu', function (e) {
            var item = e.target.closest('li.node');
            if (!item) return;
            e.preventDefault();
            var path = item.getAttribute('data-path');
            var isDir = item.getAttribute('data-kind') === 'dir';
            var inPinned = isDirectChildOfSection(item, 'pinned');
            var inRecent = isDirectChildOfSection(item, 'recent');
            openContextMenu(e.clientX, e.clientY, path, isDir, inPinned, inRecent);
        });
    }
    function isDirectChildOfSection(node, sectionKey) {
        var parentUl = node.parentElement;
        if (!parentUl) return false;
        var sectionLi = parentUl.parentElement;
        return !!(sectionLi
            && sectionLi.classList
            && sectionLi.classList.contains('section')
            && sectionLi.getAttribute('data-section') === sectionKey);
    }

    /* Vault-Header-Buttons (Datei/Ordner öffnen) werden vom REGION-Click-Handler
       in der Vault-IIFE behandelt — dort mit Dirty-Check via window.openDocument. */

    /* ----- Kontextmenü ----- */
    var ctxMenu = $('context-menu');
    var ctxTarget = null;
    function openContextMenu(x, y, path, isDir, inPinned, inRecent) {
        if (!ctxMenu) return;
        ctxTarget = { path: path, isDirectory: isDir };
        var parts = [];
        if (!isDir) parts.push('<div class="ctx-item" data-act="open">Öffnen</div>');
        var actionsBefore = parts.length;
        var actions = [];
        if (!inPinned) actions.push('<div class="ctx-item" data-act="pin">Anpinnen</div>');
        if (inPinned) actions.push('<div class="ctx-item" data-act="unpin">Vom Pin lösen</div>');
        if (inRecent) actions.push('<div class="ctx-item" data-act="remove-recent">Aus „Zuletzt" entfernen</div>');
        if (actions.length && actionsBefore) parts.push('<div class="ctx-sep"></div>');
        parts = parts.concat(actions);
        var tail = [
            '<div class="ctx-item" data-act="show">Im Explorer zeigen</div>',
            '<div class="ctx-item" data-act="copy">Pfad kopieren</div>',
        ];
        if (parts.length) parts.push('<div class="ctx-sep"></div>');
        parts = parts.concat(tail);
        ctxMenu.innerHTML = parts.join('');
        ctxMenu.style.left = x + 'px';
        ctxMenu.style.top = y + 'px';
        ctxMenu.classList.add('open');
    }
    function closeContextMenu() {
        if (ctxMenu) ctxMenu.classList.remove('open');
        ctxTarget = null;
    }
    if (ctxMenu) {
        ctxMenu.addEventListener('click', function (e) {
            var item = e.target.closest('.ctx-item');
            if (!item || item.classList.contains('disabled') || !ctxTarget) return;
            var act = item.getAttribute('data-act');
            var path = ctxTarget.path;
            var isDir = ctxTarget.isDirectory;
            closeContextMenu();
            if (act === 'open' && !isDir) {
                openDocument(path);
            } else if (act === 'pin') {
                invoke('workspace_pin', { path: path, isDirectory: isDir }).catch(function(){});
            } else if (act === 'unpin') {
                invoke('workspace_unpin', { path: path }).catch(function(){});
            } else if (act === 'remove-recent') {
                invoke('workspace_remove_recent', { path: path }).catch(function(){});
            } else if (act === 'show') {
                invoke('show_in_file_manager', { path: path }).catch(function(){});
            } else if (act === 'copy') {
                if (navigator.clipboard) navigator.clipboard.writeText(path).catch(function(){});
            }
        });
        document.addEventListener('click', function (e) {
            if (!ctxMenu.contains(e.target)) closeContextMenu();
        });
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') closeContextMenu();
        });
    }

    /* ----- Drag & Drop ----- */
    listen('tauri://drag-enter', function () {
        document.body.classList.add('dnd-active');
    });
    listen('tauri://drag-over', function () {
        document.body.classList.add('dnd-active');
    });
    listen('tauri://drag-leave', function () {
        document.body.classList.remove('dnd-active');
    });
    listen('tauri://drag-drop', function (event) {
        document.body.classList.remove('dnd-active');
        var paths = (event && event.payload && event.payload.paths) || [];
        if (paths.length === 0) return;
        var first = paths[0];
        openDocument(first);
    });

    /* ----- Backend-Events ----- */
    listen('document:loaded', function (event) {
        var data = event && event.payload || {};
        currentPath = data.path || null;
        cleanText = data.text || '';
        markDirty(false);
        setStatusPath(data.path || 'Bereit', false);
        updateWordCount(data.text || '');
        applyKindLock(data.path || '');
        invoke('workspace_add_recent', { path: data.path }).catch(function(){});
        // Such-Highlights gehen im View-Mode beim innerHTML-Replace verloren — neu setzen.
        var bar = document.getElementById('find-bar');
        if (bar && bar.classList.contains('open') && !document.body.classList.contains('edit-mode')) {
            var input = document.getElementById('find-input');
            if (input && input.value && window.ViewFinder) {
                setTimeout(function () { window.ViewFinder.setFindTerm(input.value); }, 0);
            }
        }
    });
    listen('document:dirty_changed', function (event) {
        var dirty = event && event.payload && (event.payload.is_dirty || event.payload.isDirty);
        markDirty(!!dirty);
    });
    listen('document:saved', function (event) {
        var data = event && event.payload || {};
        cleanText = data.text || editorText();
        markDirty(false);
        renderDocumentPayload(data);
        updateWordCount(data.text || '');
    });
    listen('vault:refresh', function () {
        refreshVault();
    });
    listen('app:set_mode', function (event) {
        var mode = (event && event.payload && event.payload.mode) || 'view';
        setActiveMode(mode);
        if (typeof window.afterModeSwitch === 'function') window.afterModeSwitch();
    });
    listen('panel:rail_changed', function (event) {
        var data = event && event.payload || {};
        if (typeof data.leftRailVisible === 'boolean') setRailButton('left', data.leftRailVisible);
        if (typeof data.rightRailVisible === 'boolean') setRailButton('right', data.rightRailVisible);
    });
    listen('automation:click', function (event) {
        var name = event && event.payload && event.payload.name;
        if (!name) return;
        var el = document.getElementById(name);
        if (!el) {
            try { el = document.querySelector('[data-name="' + CSS.escape(name) + '"]'); } catch (_) {}
        }
        if (!el) {
            try { el = document.querySelector(name); } catch (_) {}
        }
        if (el && typeof el.click === 'function') el.click();
    });
    listen('automation:set_editor_text', function (event) {
        var data = event && event.payload || {};
        var text = data.text || '';
        if (typeof window.loadEditorText === 'function') window.loadEditorText(text);
        updateWordCount(text);
        if (currentPath) markDirty(text !== cleanText);
    });
    listen('automation:open_document', function (event) {
        var data = event && event.payload || {};
        if (data.path) openDocument(data.path);
    });

    /* ----- Editor-Text-Tracking für Wordcount im Edit-Modus ----- */
    window.addEventListener('folio-editor-text-updated', function (e) {
        var text = e.detail || '';
        updateWordCount(text);
        if (currentPath) markDirty(text !== cleanText);
        invoke('editor_text_changed', { text: text }).catch(function(){});
    });
})();
</script>
