<!DOCTYPE html>
<html lang="de" class="">
<head>
<meta charset="UTF-8">
<base href="./">
<title>Folio</title>
<script>
  // Synchron, blocking — läuft vor dem CSS-Parse, damit der erste Paint
  // schon die richtige Theme-Klasse + Hintergrundfarbe hat. Verhindert
  // das kurze Weiß-Flackern beim WebView-Start. Wird später ggf. durch
  // theme_get überschrieben (persistierter User-Override).
  (function () {
    var dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    var html = document.documentElement;
    html.classList.add(dark ? 'theme-dark' : 'theme-light');
    html.style.background = dark ? '#1e1e1e' : '#ffffff';
  })();
</script>
<link rel="stylesheet" href="app.css">
</head>
<body class="">
<header class="toolbar" id="toolbar" role="toolbar">
  <div class="group">
    <button id="tb-back" title="Zurück (Alt+←)" aria-label="Zurück"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="10 3 5 8 10 13"/></svg></button>
    <button id="tb-forward" title="Vorwärts (Alt+→)" aria-label="Vorwärts"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 3 11 8 6 13"/></svg></button>
  </div>
  <div class="sep"></div>
  <div class="group">
    <button id="tb-mode-view" class="active ti-emoji" title="View (Ctrl+1)" aria-label="Anzeigen">&#x1F441;&#xFE0F;</button>
    <button id="tb-mode-edit" class="ti-emoji" title="Edit (Ctrl+2)" aria-label="Bearbeiten">&#x270F;&#xFE0F;</button>
  </div>
  <div class="sep edit-only"></div>
  <div class="group edit-only">
    <button id="tb-save" class="ti-emoji" title="Speichern (Ctrl+S)" aria-label="Speichern" disabled>&#x1F4BE;</button>
  </div>
  <div class="sep edit-only md-only"></div>
  <div class="group edit-only md-only">
    <button id="tb-bold" title="Fett (Ctrl+B)" style="font-weight:bold;font-family:Georgia,serif;">B</button>
    <button id="tb-italic" title="Kursiv (Ctrl+I)"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><line x1="6" y1="2" x2="11" y2="2"/><line x1="3" y1="12" x2="8" y2="12"/><line x1="9" y1="2" x2="5" y2="12"/></svg></button>
    <button id="tb-strike" title="Durchgestrichen" style="text-decoration:line-through;font-family:Georgia,serif;">S</button>
  </div>
  <div class="sep edit-only md-only"></div>
  <div class="group edit-only md-only">
    <button id="tb-heading" title="Überschrift (zyklisch H1/H2/H3)" style="font-weight:bold;font-family:Georgia,serif;">H</button>
    <button id="tb-bullet" title="Aufzählung"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><circle cx="2.5" cy="3.5" r="1" fill="currentColor"/><circle cx="2.5" cy="7" r="1" fill="currentColor"/><circle cx="2.5" cy="10.5" r="1" fill="currentColor"/><line x1="5.5" y1="3.5" x2="12" y2="3.5"/><line x1="5.5" y1="7" x2="12" y2="7"/><line x1="5.5" y1="10.5" x2="12" y2="10.5"/></svg></button>
    <button id="tb-numbered" title="Nummerierte Liste" style="font-weight:bold;font-family:Georgia,serif;font-size:12px;">1.</button>
  </div>
  <div class="sep edit-only md-only"></div>
  <div class="group edit-only md-only">
    <button id="tb-link" class="ti-emoji" title="Link (Ctrl+K)">&#x1F517;</button>
    <button id="tb-image" class="ti-emoji" title="Bild einfügen">&#x1F5BC;&#xFE0F;</button>
    <button id="tb-table" title="Tabelle einfügen"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><rect x="1.5" y="2.5" width="11" height="9" rx="1"/><line x1="1.5" y1="6" x2="12.5" y2="6"/><line x1="5" y1="2.5" x2="5" y2="11.5"/><line x1="9" y1="2.5" x2="9" y2="11.5"/></svg></button>
    <button id="tb-code" title="Inline-Code" style="font-family:Consolas,monospace;font-weight:bold;font-size:13px;">{<span style="font-size:0.7em;letter-spacing:-0.15em;margin-left:-2px;margin-right:-2px;position:relative;top:2px;">..</span>}</button>
    <button id="tb-codeblock" title="Codeblock" style="font-family:Consolas,monospace;font-weight:bold;font-size:11px;line-height:1;"><span style="position:relative;top:-3px;font-size:0.9em;">{</span><span style="display:inline-flex;flex-direction:column;line-height:0.5;font-size:0.85em;vertical-align:middle;"><span>·</span><span>·</span><span>·</span><span>·</span></span><span style="position:relative;top:3px;font-size:0.9em;">}</span></button>
  </div>
  <div class="sep edit-only md-only"></div>
  <div class="group edit-only md-only">
    <button id="tb-cheatsheet" class="ti-emoji" title="Markdown Cheat-Sheet" aria-label="Hilfe">&#x2753;</button>
  </div>
  <div class="spacer"></div>
  <div class="group">
    <button id="tb-export" class="ti-emoji" title="Exportieren…" aria-label="Exportieren" disabled>&#x1F4E4;</button>
  </div>
  <div class="sep"></div>
  <div class="group">
    <button id="tb-find" class="ti-emoji" title="Suchen (Ctrl+F)" aria-label="Suchen">&#x1F50D;</button>
    <button id="tb-rail-left" class="active" title="Linke Leiste umschalten" aria-label="Linke Leiste"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="2" y="3" width="12" height="10" rx="1"/><line x1="6" y1="3" x2="6" y2="13"/><rect x="2" y="3" width="4" height="10" fill="currentColor" opacity="0.25"/></svg></button>
    <button id="tb-minimap" class="md-only edit-only" title="Minimap umschalten" aria-label="Minimap"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="2" y="3" width="12" height="10" rx="1"/><line x1="4" y1="6" x2="9" y2="6"/><line x1="4" y1="8.5" x2="9" y2="8.5"/><line x1="4" y1="11" x2="7" y2="11"/><rect x="10.5" y="3" width="3.5" height="10" fill="currentColor" opacity="0.25"/></svg></button>
    <button id="tb-rail-right" class="active md-only" title="Rechte Leiste umschalten" aria-label="Rechte Leiste"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="2" y="3" width="12" height="10" rx="1"/><line x1="10" y1="3" x2="10" y2="13"/><rect x="10" y="3" width="4" height="10" fill="currentColor" opacity="0.25"/></svg></button>
  </div>
</header>
<aside class="vault-region" id="vault-region">
  <header class="vault-header">
    <span class="title">Arbeitsbereich</span>
    <button class="vault-cmd ti-emoji" data-cmd="addFile" title="Datei öffnen…" aria-label="Datei öffnen">&#x1F4C4;</button>
    <button class="vault-cmd ti-emoji" data-cmd="addFolder" title="Ordner hinzufügen…" aria-label="Ordner hinzufügen">&#x1F4C1;</button>
  </header>
  <ul id="vault-tree" class="tree"></ul>
</aside>
<div class="splitter-left" id="splitter-left"></div>
<div class="content-region" id="content-region">
  <div class="find-bar" id="find-bar" role="search">
    <div class="find-bar__row">
      <input type="text" id="find-input" class="find-input" placeholder="Suchen…" autocomplete="off" spellcheck="false" />
      <span class="find-counter" id="find-counter"></span>
      <button type="button" class="find-btn" id="find-prev" title="Zurück (Shift+Enter)">&#x25B2;</button>
      <button type="button" class="find-btn" id="find-next" title="Weiter (Enter)">&#x25BC;</button>
      <button type="button" class="find-btn" id="find-opts" title="Optionen">&#x2699;</button>
      <button type="button" class="find-btn" id="find-close" title="Schließen (Esc)">&#x2715;</button>
    </div>
    <div class="find-bar__opts" id="find-opts-panel">
      <label><input type="checkbox" id="find-case" /> Aa Groß-/Kleinschreibung</label>
      <label><input type="checkbox" id="find-word" /> Ganzes Wort</label>
    </div>
  </div>
  <div class="view-region" id="view-region">
    <div class="view-content" id="view-content">
      <main class="markdown-body">

      </main>
    </div>
    <div id="view-marker-lane"></div>
  </div>
  <div class="editor-region" id="editor-region">
    <div class="editor-content">
      <div id="editor-mount"></div>
    </div>
  </div>
</div>
<div class="splitter-right" id="splitter-right"></div>
<aside class="toc-region" id="toc-region">
<header class="toc-header">Inhaltsverzeichnis</header>
<ul class="toc"></ul>
</aside>
<footer class="statusbar" id="statusbar">
  <span class="status-path" id="status-path">Bereit</span>
  <span class="status-cell" id="status-wordcount" hidden></span>
  <span class="status-cell" id="status-mode">View</span>
  <button class="status-cell" id="status-language" type="button" hidden title="Editor-Sprache wählen">Plain Text</button>
  <button class="status-cell" id="status-theme-toggle" title="Theme umschalten" aria-label="Theme" style="display:inline-flex;align-items:center;justify-content:center;padding:2px 6px;"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><circle cx="8" cy="8" r="3"/><line x1="8" y1="1.5" x2="8" y2="3"/><line x1="8" y1="13" x2="8" y2="14.5"/><line x1="1.5" y1="8" x2="3" y2="8"/><line x1="13" y1="8" x2="14.5" y2="8"/><line x1="3.4" y1="3.4" x2="4.5" y2="4.5"/><line x1="11.5" y1="11.5" x2="12.6" y2="12.6"/><line x1="3.4" y1="12.6" x2="4.5" y2="11.5"/><line x1="11.5" y1="4.5" x2="12.6" y2="3.4"/></svg></button>
</footer>
<div id="zoom-indicator" hidden>100 %</div>
<div id="dnd-overlay">Datei hier ablegen, um zu öffnen</div>
<nav id="context-menu" role="menu"></nav>
<div id="rename-dialog" hidden>
  <div class="unsaved-dialog__panel" role="dialog" aria-modal="true" aria-labelledby="rename-title">
    <div class="unsaved-dialog__title" id="rename-title">Umbenennen</div>
    <div class="unsaved-dialog__text" id="rename-subtitle">Neuen Dateinamen eingeben:</div>
    <input type="text" id="rename-input" class="rename-input" autocomplete="off" spellcheck="false" />
    <div class="unsaved-dialog__actions">
      <button type="button" id="rename-cancel">Abbrechen</button>
      <button type="button" id="rename-ok" class="primary">Umbenennen</button>
    </div>
  </div>
</div>

<div id="unsaved-dialog" hidden>
  <div class="unsaved-dialog__panel" role="dialog" aria-modal="true" aria-labelledby="unsaved-title">
    <div class="unsaved-dialog__title" id="unsaved-title">Ungespeicherte Änderungen</div>
    <div class="unsaved-dialog__text">Die Datei wurde geändert. Änderungen speichern?</div>
    <div class="unsaved-dialog__actions">
      <button type="button" id="unsaved-discard">Verwerfen</button>
      <button type="button" id="unsaved-cancel">Abbrechen</button>
      <button type="button" id="unsaved-save" class="primary">Speichern</button>
    </div>
  </div>
</div>
<div id="export-dialog" hidden>
  <div class="export-dialog__panel" role="dialog" aria-modal="true" aria-labelledby="export-title">
    <div class="export-dialog__title" id="export-title">Exportieren</div>
    <div class="export-dialog__formats" id="export-formats">
      <button type="button" data-format="html" class="active">HTML</button>
      <button type="button" data-format="pdf">PDF</button>
    </div>
    <div class="export-dialog__cards" id="export-cards"></div>
    <div class="export-dialog__actions">
      <button type="button" id="export-cancel">Abbrechen</button>
      <button type="button" id="export-save" class="primary" disabled>Speichern…</button>
    </div>
  </div>
</div>
<div id="cheatsheet-overlay" hidden>
  <header class="overlay__drag">Markdown Cheat-Sheet</header>
  <div class="overlay__body" id="cheatsheet-body"></div>
</div>
<div id="lang-picker" hidden role="dialog" aria-label="Editor-Sprache wählen">
  <input type="text" id="lang-picker-input" placeholder="Sprache suchen…" autocomplete="off" spellcheck="false" />
  <ul id="lang-picker-list" role="listbox"></ul>
</div>
<script src="monaco/loader.js"></script>
<script src="editor.bundle.js"></script>
<script src="app.bundle.js"></script>
</body>
</html>
