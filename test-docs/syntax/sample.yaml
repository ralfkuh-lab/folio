# Folio-YAML-Test-Fixture. In dieser Iteration: KEIN Highlight.

name: folio
version: 0.4.2
active: true
deprecated: false
license: ~

description: >
  Markdown-Viewer/-Editor auf Tauri 2 + Rust.
  Mehrzeiliger Beschreibungsblock.

keywords:
  - markdown
  - tauri
  - rust
  - editor

config:
  automation_port: 9876
  max_recent_files: 20
  themes:
    default: light
    available: [light, dark]
  thresholds:
    warn_kb: 512
    error_kb: 2048
    ratio: 0.75
    negative_offset: -1.5

links:
  - label: Repo
    url: https://github.com/ralfkuh-lab/folio
    internal: false
  - label: Docs
    url: https://docs.example.invalid
    internal: true

escape_test: "Backslash \\, Quote \", Newline \\n, Unicode ☃ done."

# Anchor + Alias
defaults: &defaults
  retries: 3
  timeout: 30s

production:
  <<: *defaults
  endpoint: https://api.example.invalid

empty_object: {}
empty_array: []
trailing_number: 42
